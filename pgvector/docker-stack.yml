version: "3.9"

services:

  pgvector:
    image: pgvector/pgvector:pg16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: yGAnYX062
      POSTGRES_DB: vectors

    volumes:
      - pgvector_data:/var/lib/postgresql/data

    deploy:
      placement:
        constraints:
          - node.role == manager

    networks:
      - traefik_public

volumes:
  pgvector_data:

networks:
  traefik_public:
    external: true