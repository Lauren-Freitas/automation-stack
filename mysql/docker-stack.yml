version: "3.9"

services:

  mysql:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: SenhaMysql123
      MYSQL_DATABASE: evolution

    command:
      - --default-authentication-plugin=mysql_native_password

    volumes:
      - mysql_data:/var/lib/mysql

    deploy:
      placement:
        constraints:
          - node.role == manager

    networks:
      - traefik_public

volumes:
  mysql_data:

networks:
  traefik_public:
    external: true