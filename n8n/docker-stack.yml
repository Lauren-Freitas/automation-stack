version: "3.9"

services:

  n8n:
    image: n8nio/n8n:latest

    environment:
      N8N_HOST: n8n.thiagocantalovo.com
      N8N_PROTOCOL: https
      N8N_PORT: 5678

      WEBHOOK_URL: https://webhook.thiagocantalovo.com/

      NODE_ENV: production

      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: automation
      DB_POSTGRESDB_USER: admin
      DB_POSTGRESDB_PASSWORD: yGAnYX062

    volumes:
      - n8n_data:/home/node/.n8n

    deploy:
      placement:
        constraints:
          - node.role == manager

      labels:
        - traefik.enable=true

        - traefik.http.routers.n8n.rule=Host(`n8n.thiagocantalovo.com`)
        - traefik.http.routers.n8n.entrypoints=websecure
        - traefik.http.routers.n8n.tls.certresolver=le
        - traefik.http.services.n8n.loadbalancer.server.port=5678

    networks:
      - traefik_public

volumes:
  n8n_data:

networks:
  traefik_public:
    external: true