version: "3.9"

services:

  portainer:
    image: portainer/portainer-ce:latest

    command:
      - -H
      - unix:///var/run/docker.sock

    ports:
      - 9000:9000
      - 9443:9443

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    deploy:
      placement:
        constraints:
          - node.role == manager

    networks:
      - traefik_public

volumes:
  portainer_data:

networks:
  traefik_public:
    external: true