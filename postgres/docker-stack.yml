version: "3.9"

services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: automation

    volumes:
      - postgres_data:/var/lib/postgresql/data

    deploy:
      placement:
        constraints:
          - node.role == manager

    networks:
      - traefik_public

volumes:
  postgres_data:

networks:
  traefik_public:
    external: true
