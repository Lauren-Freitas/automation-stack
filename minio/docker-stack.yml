version: "3.9"

services:

  minio:
    image: minio/minio:latest

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: thiago
      MINIO_ROOT_PASSWORD: SenhaSuperSegura123

      MINIO_SERVER_URL: https://s3.thiagocantalovo.com
      MINIO_BROWSER_REDIRECT_URL: https://minio.thiagocantalovo.com

    volumes:
      - minio_data:/data

    deploy:
      placement:
        constraints:
          - node.role == manager

      labels:
        - traefik.enable=true

        - traefik.http.routers.minio.rule=Host(`s3.thiagocantalovo.com`)
        - traefik.http.routers.minio.entrypoints=websecure
        - traefik.http.routers.minio.tls.certresolver=le
        - traefik.http.routers.minio.service=minio
        - traefik.http.services.minio.loadbalancer.server.port=9000

        - traefik.http.routers.minio-console.rule=Host(`minio.thiagocantalovo.com`)
        - traefik.http.routers.minio-console.entrypoints=websecure
        - traefik.http.routers.minio-console.tls.certresolver=le
        - traefik.http.routers.minio-console.service=minio-console
        - traefik.http.services.minio-console.loadbalancer.server.port=9001

    networks:
      - traefik_public

volumes:
  minio_data:

networks:
  traefik_public:
    external: true